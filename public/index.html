<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cats Hockey FIX</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background: #0d1b2a; overflow: hidden; touch-action: none; }
        
        /* Холст на заднем плане */
        canvas { position: absolute; top: 0; left: 0; z-index: 1; display: block; }

        /* Интерфейс НАД холстом */
        .screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 100; display: none; flex-direction: column; 
            justify-content: center; align-items: center; 
            background: rgba(13, 27, 42, 0.9);
        }
        .screen.active { display: flex; }

        .panel { background: #1b263b; padding: 30px; border-radius: 20px; border: 2px solid #00b4d8; text-align: center; width: 320px; }
        h1 { color: #fff; margin-bottom: 20px; font-size: 24px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; text-align: center; }
        button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; background: #00b4d8; color: #fff; font-weight: bold; cursor: pointer; }
        
        #gameUI { pointer-events: none; background: transparent; }
        #score { position: absolute; top: 40px; width: 100%; text-align: center; font-size: 40px; color: #1b263b; z-index: 10; font-weight: 900; pointer-events: none; }
    </style>
</head>
<body>

    <div id="score">0 : 0</div>
    <canvas id="game"></canvas>

    <div id="authScreen" class="screen active">
        <div class="panel">
            <h1>CATS HOCKEY</h1>
            <input type="text" id="uIn" placeholder="НИК">
            <input type="password" id="pIn" placeholder="ПАРОЛЬ">
            <button onclick="auth(false)">ВОЙТИ</button>
            <button onclick="auth(true)" style="background: #3e5c76;">РЕГИСТРАЦИЯ</button>
        </div>
    </div>

    <div id="mainMenu" class="screen">
        <div class="panel">
            <h2 id="hello" style="color: #00e5ff;">Привет!</h2>
            <button onclick="startSearch()" style="background: #fb8500; font-size: 20px;">В БОЙ!</button>
            <button onclick="startBot()" style="background: #4caf50;">ИГРА С БОТОМ</button>
            <button onclick="location.reload()">ВЫХОД</button>
        </div>
    </div>

    <div id="searchScreen" class="screen">
        <div class="panel">
            <h2 style="color: #fff;">ИЩЕМ ИГРОКА...</h2>
            <div style="margin: 20px; color: #00b4d8;">🌀</div>
            <button onclick="location.reload()">ОТМЕНА</button>
        </div>
    </div>

    <script>
        const socket = io();
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let W, H, myName = "", mySide = "left", isPlaying = false, isBot = false;
        let pScore = 0, eScore = 0, currentRoom = "";

        // Физика
        const friction = 0.998;
        let p1 = { x: 0, y: 0, r: 40, color: '#0077b6' };
        let p2 = { x: 0, y: 0, r: 40, color: '#e63946' };
        let puck = { x: 0, y: 0, r: 20, vx: 0, vy: 0 };

        function auth(reg) {
            socket.emit('auth', { username: uIn.value, password: pIn.value, isRegister: reg });
        }

        socket.on('authResponse', (res) => {
            if(res.success) {
                myName = res.user.name;
                hello.innerText = "Кот: " + myName;
                showScreen('mainMenu');
            } else alert(res.msg);
        });

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startSearch() {
            showScreen('searchScreen');
            socket.emit('joinGame', { name: myName });
        }

        function startBot() {
            isBot = true; isPlaying = true;
            initPositions();
            showScreen('none');
            loop();
        }

        socket.on('init', d => { mySide = d.side; currentRoom = d.roomId; });
        socket.on('startGame', () => { 
            isBot = false; isPlaying = true; 
            initPositions();
            showScreen('none'); 
            loop(); 
        });

        function initPositions() {
            puck.x = W/2; puck.y = H/2; puck.vx = 0; puck.vy = 0;
            p1.y = H/2; p2.y = H/2;
            p1.x = 100; p2.x = W - 100;
        }

        socket.on('updateState', d => {
            if(isBot) return;
            const en = d.players.find(p => p.id !== socket.id);
            if(en) { p2.x = en.x; p2.y = en.y; }
            puck = d.puck;
        });

        function loop() {
            if(!isPlaying) return;

            // Движение шайбы
            puck.vx *= friction; puck.vy *= friction;
            puck.x += puck.vx; puck.y += puck.vy;

            // Стенки
            if(puck.y < 20 || puck.y > H-20) puck.vy *= -1;
            
            // Ворота
            if(puck.x < 0) { if(puck.y > H/2-90 && puck.y < H/2+90) { eScore++; initPositions(); } else { puck.x=0; puck.vx*=-1; } }
            if(puck.x > W) { if(puck.y > H/2-90 && puck.y < H/2+90) { pScore++; initPositions(); } else { puck.x=W; puck.vx*=-1; } }

            document.getElementById('score').innerText = `${pScore} : ${eScore}`;

            // Столкновение игрока
            let dx = puck.x - p1.x, dy = puck.y - p1.y, dist = Math.sqrt(dx*dx + dy*dy);
            if(dist < p1.r + puck.r) {
                puck.vx = (dx/dist) * 15;
                puck.vy = (dy/dist) * 15;
            }

            // Бот
            if(isBot) {
                p2.x = W - 80;
                p2.y += (puck.y - p2.y) * 0.1;
                let bdx = puck.x - p2.x, bdy = puck.y - p2.y, bdist = Math.sqrt(bdx*bdx + bdy*bdy);
                if(bdist < p2.r + puck.r) { puck.vx = (bdx/bdist) * 15; puck.vy = (bdy/bdist) * 15; }
            }

            draw();
            if(!isBot) socket.emit('updatePos', { roomId: currentRoom, x: p1.x, y: p1.y, puck });
            requestAnimationFrame(loop);
        }

        function draw() {
            ctx.fillStyle = '#f0faff'; ctx.fillRect(0,0,W,H);
            ctx.strokeStyle = '#rgba(0,0,0,0.1)'; ctx.lineWidth = 5;
            ctx.strokeRect(10,10,W-20,H-20);
            ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke();
            
            // Ворота
            ctx.fillStyle = '#ff5252'; ctx.fillRect(0, H/2-90, 10, 180); ctx.fillRect(W-10, H/2-90, 10, 180);

            // Объекты
            ctx.fillStyle = '#1b263b'; ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.r, 0, 7); ctx.fill();
            ctx.fillStyle = p1.color; ctx.beginPath(); ctx.arc(p1.x, p1.y, p1.r, 0, 7); ctx.fill();
            ctx.fillStyle = p2.color; ctx.beginPath(); ctx.arc(p2.x, p2.y, p2.r, 0, 7); ctx.fill();
        }

        window.addEventListener('mousemove', e => {
            if(!isPlaying) return;
            p1.x = mySide === "left" ? Math.min(e.clientX, W/2-50) : Math.max(e.clientX, W/2+50);
            p1.y = e.clientY;
        });

        function resize() { W = window.innerWidth; H = window.innerHeight; canvas.width = W; canvas.height = H; }
        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
