<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cats Hokey - Definitive Edition</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; font-family: 'Montserrat', sans-serif; }
        body { background: #0d1b2a; color: white; overflow: hidden; touch-action: none; position: fixed; width: 100%; height: 100%; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: #eef2f3; }
        
        /* Экраны */
        .screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 100; display: none; flex-direction: column; 
            justify-content: center; align-items: center; 
            background: rgba(13, 27, 42, 0.85); backdrop-filter: blur(12px); 
        }
        .screen.active { display: flex; }
        
        .panel { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 25px; padding: 30px; text-align: center; width: 90%; max-width: 400px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Кнопки и Инпуты */
        button { padding: 15px; margin: 8px 0; border-radius: 12px; border: none; background: #00b4d8; color: white; font-weight: 900; width: 100%; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 2px solid #00e5ff; background: rgba(0,0,0,0.6); color: white; text-align: center; }

        /* UI Игры */
        #gameUI { pointer-events: none; background: transparent; backdrop-filter: none; }
        #score { position: absolute; top: 30px; width: 100%; text-align: center; font-size: 3rem; color: #1b263b; font-weight: 900; z-index: 10; display: flex; justify-content: center; gap: 50px; }
        
        /* Баттл-пасс */
        .bp-cont { background: #222; height: 15px; border-radius: 10px; margin: 15px 0; overflow: hidden; border: 1px solid #444; }
        #bpBar { background: linear-gradient(90deg, #00e5ff, #00b4d8); height: 100%; width: 0%; transition: 1s; }

        /* Списки (Лидерборд/Админка) */
        .list-box { max-height: 200px; overflow-y: auto; margin: 15px 0; padding-right: 5px; }
        .item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="score">
        <span id="s1">0</span>
        <span id="s2">0</span>
    </div>
    
    <canvas id="game"></canvas>

    <div id="authScreen" class="screen active">
        <div class="panel">
            <h1 style="font-size: 2rem; margin-bottom: 10px;">CATS HOCKEY</h1>
            <input type="text" id="uIn" placeholder="НИК">
            <input type="password" id="pIn" placeholder="ПАРОЛЬ">
            <button onclick="auth(false)">ИГРАТЬ</button>
            <button onclick="auth(true)" style="background:none; border:1px solid #444">РЕГИСТРАЦИЯ</button>
        </div>
    </div>

    <div id="mainMenu" class="screen">
        <div style="position:absolute; top:20px; right:20px; text-align:right;">
            🏆 ELO: <span id="mElo" style="color:#00e5ff">0</span>
        </div>
        <div class="panel">
            <h2 id="hello">Привет!</h2>
            <button onclick="join()" style="background:#fb8500; font-size:1.5rem; margin-top:15px;">В БОЙ!</button>
            <button onclick="showScreen('shopScreen')">🛒 МАГАЗИН</button>
            <button onclick="showScreen('bpScreen')">🎁 BATTLE PASS</button>
            <button onclick="loadLeaderboard()">📊 ЛИДЕРЫ</button>
            <div id="adminArea" style="display:none;"><button onclick="loadAdmin()" style="background:#d62828">АДМИНКА</button></div>
            <button onclick="location.reload()" style="background:#444">ВЫХОД</button>
        </div>
    </div>

    <div id="shopScreen" class="screen">
        <div class="panel">
            <h2>ПРОКАЧКА</h2>
            <p style="margin:10px 0;">Уровень удара: <span id="sLvl" style="color:#00e5ff">0</span>/10</p>
            <button onclick="buy()">УЛУЧШИТЬ (100 ELO)</button>
            <button onclick="showScreen('mainMenu')" style="background:#444">НАЗАД</button>
        </div>
    </div>

    <div id="bpScreen" class="screen">
        <div class="panel">
            <h2>SEASON I</h2>
            <div class="bp-cont"><div id="bpBar"></div></div>
            <p>Прогресс: <span id="mXp">0</span> / 300 XP</p>
            <button onclick="showScreen('mainMenu')" style="background:#444; margin-top:20px;">НАЗАД</button>
        </div>
    </div>

    <div id="leaderScreen" class="screen">
        <div class="panel">
            <h2>ТОП КОТОВ</h2>
            <div id="leaderList" class="list-box"></div>
            <button onclick="showScreen('mainMenu')" style="background:#444">НАЗАД</button>
        </div>
    </div>

    <div id="searchScreen" class="screen">
        <div class="panel">
            <div style="font-size:3rem; animation: rotate 2s linear infinite;">🏒</div>
            <h2 style="margin:20px 0;">ИЩЕМ КАТКУ...</h2>
            <button onclick="startBot()" style="background:#4caf50">ИГРАТЬ С БОТОМ</button>
            <button onclick="location.reload()" style="background:#444">ОТМЕНА</button>
        </div>
    </div>

    <div id="adminScreen" class="screen">
        <div class="panel">
            <h2>УПРАВЛЕНИЕ</h2>
            <div id="adminList" class="list-box"></div>
            <button onclick="showScreen('mainMenu')" style="background:#444">НАЗАД</button>
        </div>
    </div>

    <script>
        const socket = io();
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let W, H, myData = {}, isMaster = false, isPlaying = false, isBot = false, mySide = "left", roomId = "";
        let pScore = 0, eScore = 0;

        // Физика
        const friction = 0.9985;
        let p1 = { x: 0, y: 0, r: 40, color: '#0077b6', name: "" };
        let p2 = { x: 0, y: 0, r: 40, color: '#e63946', name: "" };
        let puck = { x: 0, y: 0, r: 22, vx: 0, vy: 0 };

        function auth(reg) { socket.emit('auth', { username: uIn.value, password: pIn.value, isRegister: reg }); }
        socket.on('authResponse', res => {
            if(res.success) {
                myData = res.user;
                updateUI();
                if(myData.name === 'admin') adminArea.style.display = 'block';
                showScreen('mainMenu');
            } else alert(res.msg);
        });

        function updateUI() {
            hello.innerText = "Кот: " + myData.name;
            mElo.innerText = myData.elo;
            sLvl.innerText = myData.speedUpgrades || 0;
            mXp.innerText = myData.xp || 0;
            bpBar.style.width = ((myData.xp || 0) / 300 * 100) + "%";
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            if(id !== 'none') document.getElementById(id).classList.add('active');
        }

        // Магазин и лидеры
        function buy() { socket.emit('buyUpgrade', { name: myData.name }); }
        socket.on('upgradeSuccess', u => { myData = u; updateUI(); });

        function loadLeaderboard() {
            socket.emit('adminGetUsers'); // Используем тот же эмит
            showScreen('leaderScreen');
        }

        function loadAdmin() {
            socket.emit('adminGetUsers');
            showScreen('adminScreen');
        }

        socket.on('adminUserList', list => {
            const lCont = document.getElementById('leaderList');
            const aCont = document.getElementById('adminList');
            lCont.innerHTML = ""; aCont.innerHTML = "";
            list.sort((a,b) => b.elo - a.elo).forEach(u => {
                lCont.innerHTML += `<div class="item"><span>${u.name}</span><b>${u.elo}</b></div>`;
                aCont.innerHTML += `<div class="item"><span>${u.name}</span><button onclick="delU('${u.name}')" style="width:50px; padding:2px; background:red;">X</button></div>`;
            });
        });

        function delU(n) { if(confirm('Удалить?')) socket.emit('adminDeleteUser', n); }

        // --- МУЛЬТИПЛЕЕР (MASTER/CLIENT) ---
        function join() { showScreen('searchScreen'); socket.emit('joinGame', { name: myData.name }); }

        function startBot() {
            isBot = true; isPlaying = true; isMaster = true; mySide = "left";
            p1.name = myData.name; p2.name = "Бот"; resetPuck(); showScreen('none'); loop();
        }

        socket.on('init', d => { mySide = d.side; roomId = d.roomId; isMaster = d.isMaster; });
        socket.on('startGame', d => {
            isBot = false; isPlaying = true;
            p1.name = myData.name;
            let en = d.players.find(p => p.id !== socket.id);
            p2.name = en ? en.name : "Враг";
            resetPuck(); showScreen('none'); loop();
        });

        socket.on('updateState', d => {
            if(isMaster) return;
            p2.x = d.x; p2.y = d.y; 
            puck = d.puck;
            pScore = d.pScore; eScore = d.eScore;
        });

        function loop() {
            if(!isPlaying) return;
            if(isMaster) {
                puck.vx *= friction; puck.vy *= friction;
                puck.x += puck.vx; puck.y += puck.vy;
                if(puck.y < 25 || puck.y > H-25) puck.vy *= -1;
                if(puck.x < 0) { if(puck.y > H/2-90 && puck.y < H/2+90) { eScore++; resetPuck(); } else { puck.x=0; puck.vx*=-1; } }
                if(puck.x > W) { if(puck.y > H/2-90 && puck.y < H/2+90) { pScore++; resetPuck(); } else { puck.x=W; puck.vx*=-1; } }
                
                checkHit(p1, (myData.speedUpgrades || 0));
                if(isBot) {
                    p2.x = W - 80; p2.y += (puck.y - p2.y) * 0.12;
                    checkHit(p2, 0);
                } else {
                    checkHit(p2, 0); // В мультиплеере мастер просто проверяет столкновение со вторым игроком
                }
                socket.emit('sync', { roomId, x: p1.x, y: p1.y, puck, pScore, eScore });
            } else {
                socket.emit('sync', { roomId, x: p1.x, y: p1.y });
            }
            s1.innerText = pScore; s2.innerText = eScore;
            draw();
            requestAnimationFrame(loop);
        }

        function checkHit(p, bonus) {
            let dx = puck.x - p.x, dy = puck.y - p.y, dist = Math.sqrt(dx*dx + dy*dy);
            if(dist < p.r + puck.r) {
                let s = 16 + bonus;
                puck.vx = (dx/dist) * s;
                puck.vy = (dy/dist) * s;
            }
        }

        function resetPuck() { puck.x = W/2; puck.y = H/2; puck.vx = 0; puck.vy = 0; }

        function draw() {
            ctx.fillStyle = '#f0f4f8'; ctx.fillRect(0,0,W,H);
            ctx.strokeStyle = 'rgba(0,180,216,0.15)'; ctx.lineWidth = 10;
            ctx.strokeRect(10,10,W-20,H-20);
            ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
            ctx.fillStyle = '#ff5252'; ctx.fillRect(0, H/2-90, 10, 180); ctx.fillRect(W-10, H/2-90, 10, 180);
            ctx.fillStyle = '#1b263b'; ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.r, 0, 7); ctx.fill();
            drawP(p1); drawP(p2);
        }

        function drawP(p) {
            ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 7); ctx.fill();
            ctx.fillStyle = "#1b263b"; ctx.font = "bold 16px Montserrat"; ctx.textAlign = "center";
            ctx.fillText(p.name, p.x, p.y - p.r - 12);
        }

        window.addEventListener('mousemove', e => {
            if(!isPlaying) return;
            p1.x = mySide === "left" ? Math.min(e.clientX, W/2-50) : Math.max(e.clientX, W/2+50);
            p1.y = e.clientY;
        });

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            W = window.innerWidth; H = window.innerHeight;
            canvas.width = W * dpr; canvas.height = H * dpr;
            ctx.scale(dpr, dpr);
            canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
        }
        window.addEventListener('resize', resize); resize();
    </script>
</body>
</html>
