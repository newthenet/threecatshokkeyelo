<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cats Hockey - THE FINAL</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; font-family: 'Montserrat', sans-serif; }
        body { background: #0d1b2a; color: white; overflow: hidden; touch-action: none; position: fixed; width: 100%; height: 100%; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; background: #f0f4f8; }
        
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; background: rgba(13, 27, 42, 0.9); backdrop-filter: blur(10px); }
        .screen.active { display: flex; }
        .panel { background: rgba(255, 255, 255, 0.05); border: 2px solid #00e5ff; border-radius: 20px; padding: 30px; text-align: center; width: 90%; max-width: 400px; }
        
        button { padding: 15px; margin: 8px 0; border-radius: 12px; border: none; background: #00b4d8; color: white; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; background: #1b263b; color: white; text-align: center; font-size: 16px; }
        
        #score { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 3rem; color: #1b263b; font-weight: 900; z-index: 10; pointer-events: none; }
        
        /* Анимация поиска */
        .loader { width: 80px; height: 80px; border: 5px solid #00e5ff; border-radius: 50%; border-top-color: transparent; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .pulse { animation: pulse 1.5s infinite; font-size: 1.2rem; color: #00e5ff; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .bp-cont { background: #1b263b; height: 15px; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #bpBar { background: linear-gradient(90deg, #00e5ff, #00b4d8); height: 100%; width: 0%; transition: 0.5s; }
        .item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <div id="score"><span id="sL">0</span> : <span id="sR">0</span></div>
    <canvas id="game"></canvas>

    <div id="authScreen" class="screen active">
        <div class="panel"><h1>CATS HOCKEY</h1><input id="uIn" placeholder="НИК"><input type="password" id="pIn" placeholder="ПАРОЛЬ"><button onclick="auth(false)">ВОЙТИ</button><button onclick="auth(true)" style="background:#3e5c76">РЕГИСТРАЦИЯ</button></div>
    </div>

    <div id="mainMenu" class="screen">
        <div style="position:absolute; top:20px; right:20px;">🏆 ELO: <span id="mElo" style="color:#00e5ff">0</span></div>
        <div class="panel"><h2 id="hello">Кот</h2>
            <button onclick="findGame()" style="background:#fb8500; font-size:1.2rem;">ИГРАТЬ ОНЛАЙН</button>
            <button onclick="startBot()" style="background:#4caf50;">ИГРАТЬ С БОТОМ</button>
            <button onclick="showScreen('shopScreen')">🛒 МАГАЗИН</button>
            <button onclick="showScreen('bpScreen')">🎁 BATTLE PASS</button>
            <button onclick="showScreen('topScreen'); socket.emit('getLeaderboard')">📊 ТОП</button>
            <button id="admBtn" onclick="openAdmin()" style="display:none; background:red;">АДМИНКА</button>
            <button onclick="logout()" style="background:#444">ВЫЙТИ</button>
        </div>
    </div>

    <div id="searchScreen" class="screen">
        <div class="loader"></div>
        <div class="pulse">ИЩЕМ ПРОТИВНИКА...</div>
        <button onclick="location.reload()" style="background:#444; width:200px; margin-top:30px;">ОТМЕНА</button>
    </div>

    <div id="shopScreen" class="screen">
        <div class="panel"><h2>МАГАЗИН</h2><p>Сила удара: <span id="sLvl">0</span></p><button onclick="socket.emit('buyUpgrade', {name:myData.name})">УЛУЧШИТЬ (100 ELO)</button><button onclick="showScreen('mainMenu')" style="background:#444">НАЗАД</button></div>
    </div>

    <div id="bpScreen" class="screen">
        <div class="panel"><h2>BATTLE PASS</h2><div class="bp-cont"><div id="bpBar"></div></div><p><span id="mXp">0</span> / 500 XP</p><button onclick="showScreen('mainMenu')" style="background:#444">НАЗАД</button></div>
    </div>

    <div id="topScreen" class="screen">
        <div class="panel"><h2>ТОП</h2><div id="topList"></div><button onclick="showScreen('mainMenu')" style="background:#444">НАЗАД</button></div>
    </div>

    <div id="adminScreen" class="screen">
        <div class="panel"><h2>АДМИНКА</h2><div id="adminList"></div><button onclick="showScreen('mainMenu')" style="background:#444">НАЗАД</button></div>
    </div>

    <script>
        const socket = io();
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let myData = {}, isPlaying = false, isMaster = false, isBotMode = false, mySide = "left", roomId = "";
        let pScore = 0, eScore = 0, opponentName = "Враг";

        let p1 = { x: 100, y: 300, r: 40, color: '#0077b6' };
        let p2 = { x: 700, y: 300, r: 40, color: '#e63946' };
        let puck = { x: 400, y: 300, r: 22, vx: 0, vy: 0 };

        // АВТОРИЗАЦИЯ
        window.onload = () => { const s = localStorage.getItem('catAuth'); if(s) socket.emit('auth', JSON.parse(s)); };
        function auth(reg) { socket.emit('auth', { username: uIn.value, password: pIn.value, isRegister: reg }); }
        socket.on('authResponse', r => {
            if(r.success) {
                myData = r.user; updateUI();
                localStorage.setItem('catAuth', JSON.stringify({ username: myData.name, password: pIn.value || myData.password, isRegister: false }));
                if(myData.name === 'admin') admBtn.style.display = 'block';
                showScreen('mainMenu');
            } else alert("Ошибка");
        });
        function updateUI() {
            hello.innerText = "Кот: " + myData.name; mElo.innerText = myData.elo;
            sLvl.innerText = myData.speedUpgrades || 0; mXp.innerText = myData.xp;
            bpBar.style.width = Math.min((myData.xp/500)*100, 100) + "%";
        }
        function logout() { localStorage.removeItem('catAuth'); location.reload(); }

        // ИГРА
        function findGame() { showScreen('searchScreen'); socket.emit('joinGame', { name: myData.name }); }
        function startBot() { isBotMode = true; isMaster = true; opponentName = "Робо-Кот"; showScreen('none'); isPlaying = true; loop(); }

        socket.on('init', d => { mySide = d.side; roomId = d.roomId; isMaster = d.isMaster; });
        socket.on('startGame', d => { 
            let e = d.players.find(p => p.id !== socket.id); opponentName = e ? e.name : "Враг";
            showScreen('none'); isPlaying = true; loop(); 
        });

        socket.on('updateState', d => {
            p2.x = d.x; p2.y = d.y;
            if(!isMaster) { puck = d.puck; pScore = d.pScore; eScore = d.eScore; }
        });

        function loop() {
            if(!isPlaying) return;
            if(isMaster) {
                puck.vx *= 0.99; puck.vy *= 0.99; puck.x += puck.vx; puck.y += puck.vy;
                if(puck.y < 25 || puck.y > 575) puck.vy *= -1;
                if(puck.x < 0) { if(puck.y > 210 && puck.y < 390) { eScore++; check(); reset(); } else { puck.x=0; puck.vx*=-1; } }
                if(puck.x > 800) { if(puck.y > 210 && puck.y < 390) { pScore++; check(); reset(); } else { puck.x=800; puck.vx*=-1; } }
                
                // Логика бота
                if(isBotMode) { p2.y += (puck.y - p2.y) * 0.1; p2.x = 700; }

                hit(p1, myData.speedUpgrades || 0); hit(p2, isBotMode ? 2 : 0);
                if(!isBotMode) socket.emit('sync', { roomId, x: p1.x, y: p1.y, puck, pScore, eScore });
            } else { socket.emit('sync', { roomId, x: p1.x, y: p1.y }); }
            draw(); requestAnimationFrame(loop);
        }

        function hit(p, b) {
            let dx = puck.x - p.x, dy = puck.y - p.y, dist = Math.sqrt(dx*dx + dy*dy);
            if(dist < p.r + puck.r) { let s = 17 + b; puck.vx = (dx/dist)*s; puck.vy = (dy/dist)*s; }
        }
        function reset() { puck = { x: 400, y: 300, vx: 0, vy: 0 }; }
        function check() {
            if(pScore >= 3 || eScore >= 3) {
                isPlaying = false;
                let win = pScore >= 3;
                if(!isBotMode) socket.emit('endGame', { winner: win ? myData.name : opponentName, loser: win ? opponentName : myData.name });
                alert(win ? "ПОБЕДА!" : "ПРОИГРЫШ"); location.reload();
            }
        }

        // КНОПКИ И ДОПЫ
        socket.on('upgradeSuccess', u => { myData = u; updateUI(); });
        socket.on('leaderboardData', l => { topList.innerHTML = l.map(u => `<div class="item"><span>${u.name}</span><b>${u.elo}</b></div>`).join(''); });
        function openAdmin() { socket.emit('adminGetUsers'); showScreen('adminScreen'); }
        socket.on('adminUserList', l => { adminList.innerHTML = l.map(u => `<div class="item"><span>${u.name}</span><button onclick="socket.emit('adminDeleteUser','${u.name}');this.parentElement.remove()">X</button></div>`).join(''); });

        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); if(id !== 'none') document.getElementById(id).classList.add('active'); }
        
        window.addEventListener('mousemove', e => {
            if(!isPlaying) return;
            let r = canvas.getBoundingClientRect();
            let x = ((e.clientX - r.left) / r.width) * 800;
            let y = ((e.clientY - r.top) / r.height) * 600;
            p1.x = mySide === 'left' ? Math.min(x, 360) : Math.max(x, 440);
            p1.y = Math.max(40, Math.min(560, y));
        });

        function draw() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let s = Math.min(canvas.width/800, canvas.height/600);
            ctx.save(); ctx.translate(canvas.width/2 - 400*s, canvas.height/2 - 300*s); ctx.scale(s, s);
            ctx.fillStyle = "#fff"; ctx.fillRect(0,0,800,600);
            ctx.strokeStyle = "#00b4d8"; ctx.lineWidth = 5; ctx.strokeRect(10,10,780,580);
            ctx.beginPath(); ctx.moveTo(400,0); ctx.lineTo(400,600); ctx.stroke();
            ctx.fillStyle = "#e63946"; ctx.fillRect(0, 210, 10, 180); ctx.fillRect(790, 210, 10, 180);
            ctx.fillStyle = p1.color; ctx.beginPath(); ctx.arc(p1.x, p1.y, p1.r, 0, 7); ctx.fill();
            ctx.fillStyle = p2.color; ctx.beginPath(); ctx.arc(p2.x, p2.y, p2.r, 0, 7); ctx.fill();
            ctx.fillStyle = "#1b263b"; ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.r, 0, 7); ctx.fill();
            ctx.restore(); sL.innerText = pScore; sR.innerText = eScore;
        }
    </script>
</body>
</html>
