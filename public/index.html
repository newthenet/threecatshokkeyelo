<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cats Hokey ELO Server Edition</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; font-family: 'Montserrat', sans-serif; }
        body { background-color: #0d1b2a; color: white; overflow: hidden; touch-action: none; position: fixed; width: 100%; height: 100%; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: #e0f7fa; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: none; flex-direction: column; justify-content: center; align-items: center; background: rgba(13, 27, 42, 0.8); backdrop-filter: blur(10px); }
        .screen.active { display: flex; }
        .panel { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 15px; padding: 20px; text-align: center; width: 90%; max-width: 400px; }
        button { padding: 12px 20px; margin: 5px; border-radius: 8px; border: none; background: #00b4d8; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0077b6; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #00e5ff; background: rgba(0,0,0,0.7); color: white; text-align: center; }
        #scoreBoard { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 2rem; color: #1b263b; font-weight: bold; z-index: 5; display: flex; gap: 40px; }
        .user-item { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 8px; margin: 4px 0; border-radius: 5px; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="authScreen" class="screen active">
        <div class="panel">
            <h1>Cats Hokey</h1>
            <input type="text" id="uIn" placeholder="Никнейм">
            <input type="password" id="pIn" placeholder="Пароль">
            <p id="authMsg" style="color:#ff4d4d; font-size:0.8rem;"></p>
            <button onclick="sendAuth(false)">Войти</button>
            <button onclick="sendAuth(true)" style="opacity:0.7">Регистрация</button>
        </div>
    </div>

    <div id="mainMenu" class="screen">
        <div class="panel">
            <h2 id="mName">Игрок</h2>
            <p style="margin-bottom: 15px;">🏆 ELO: <span id="mElo">0</span></p>
            <button onclick="findGame()" style="background:#fb8500; width: 100%; font-size: 1.2rem;">ИГРАТЬ ОНЛАЙН</button>
            <div id="adminArea" style="display:none; margin-top:15px; padding-top:15px; border-top: 1px solid #555;">
                <button onclick="showUsers()" style="background:#d62828; width:100%">АДМИН: ИГРОКИ</button>
            </div>
            <button onclick="location.reload()" style="background:#555; width:100%; margin-top:10px;">Выход</button>
        </div>
    </div>

    <div id="adminScreen" class="screen">
        <div class="panel">
            <h2>Список игроков</h2>
            <div id="userListCont" style="max-height: 250px; overflow-y: auto; margin: 15px 0;"></div>
            <button onclick="showScreen('mainMenu')">Назад</button>
        </div>
    </div>

    <div id="gameUI" class="screen" style="background: transparent; backdrop-filter: none; pointer-events: none;">
        <div id="scoreBoard">
            <div id="sMy">0</div>
            <div id="sEn">0</div>
        </div>
    </div>

    <script>
        const socket = io();
        let myName = "", myElo = 0, mySide = "", currentRoom = "", isPlaying = false;
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        // --- ФИЗИКА (КАК ПРОСИЛ) ---
        const PUCK_FRICTION = 0.997; // Скользит "прям сильно"
        const BASE_SPEED = 14;       // Базовая скорость увеличена

        let p1 = { x: 0, y: 0, r: 35, color: '#0077b6' }; // Ты Синий
        let p2 = { x: 0, y: 0, r: 35, color: '#e63946' }; // Враг Красный
        let puck = { x: 0, y: 0, r: 20, vx: 0, vy: 0 };

        // --- AUTH ---
        function sendAuth(isRegister) {
            const u = document.getElementById('uIn').value;
            const p = document.getElementById('pIn').value;
            socket.emit('auth', { username: u, password: p, isRegister });
        }

        socket.on('authResponse', (res) => {
            if(res.success) {
                myName = res.user.name;
                myElo = res.user.elo;
                document.getElementById('mName').innerText = myName;
                document.getElementById('mElo').innerText = myElo;
                if(myName === 'admin') document.getElementById('adminArea').style.display = 'block';
                showScreen('mainMenu');
            } else {
                document.getElementById('authMsg').innerText = res.msg;
            }
        });

        // --- ADMIN ---
        function showUsers() {
            socket.emit('adminGetUsers');
            showScreen('adminScreen');
        }
        socket.on('adminUserList', (list) => {
            const cont = document.getElementById('userListCont');
            cont.innerHTML = "";
            list.forEach(u => {
                cont.innerHTML += `
                    <div class="user-item">
                        <span>${u.name} (${u.elo})</span>
                        ${u.name !== 'admin' ? `<button onclick="deleteUser('${u.name}')" style="padding:4px 8px; background:red; font-size:10px;">DEL</button>` : ''}
                    </div>
                `;
            });
        });
        function deleteUser(n) { if(confirm(`Удалить ${n}?`)) socket.emit('adminDeleteUser', n); }
        socket.on('adminMsg', (m) => { alert(m); showUsers(); });

        // --- GAME ---
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function findGame() {
            socket.emit('joinGame', { name: myName });
            showScreen('gameUI');
        }

        socket.on('init', (d) => { mySide = d.side; currentRoom = d.roomId; });
        socket.on('startGame', () => { isPlaying = true; puck.x = W/2; puck.y = H/2; loop(); });
        
        socket.on('updateState', (d) => {
            const enemy = d.players.find(p => p.id !== socket.id);
            if(enemy) { p2.x = enemy.x; p2.y = enemy.y; }
            puck = d.puck;
        });

        function loop() {
            if(!isPlaying) return;
            
            // Физика шайбы
            puck.vx *= PUCK_FRICTION; puck.vy *= PUCK_FRICTION;
            puck.x += puck.vx; puck.y += puck.vy;

            if(puck.y < 0 || puck.y > H) puck.vy *= -1;
            if(puck.x < 0 || puck.x > W) puck.vx *= -1;

            // Столкновение
            let dx = puck.x - p1.x, dy = puck.y - p1.y, dist = Math.sqrt(dx*dx + dy*dy);
            if(dist < p1.r + puck.r) {
                puck.vx = (dx/dist) * BASE_SPEED;
                puck.vy = (dy/dist) * BASE_SPEED;
            }

            draw();
            socket.emit('updatePos', { roomId: currentRoom, x: p1.x, y: p1.y, puck });
            requestAnimationFrame(loop);
        }

        window.addEventListener('mousemove', (e) => {
            if(!isPlaying) return;
            p1.x = mySide === 'left' ? Math.min(e.clientX, W/2 - 40) : Math.max(e.clientX, W/2 + 40);
            p1.y = e.clientY;
        });

        function draw() {
            ctx.fillStyle = '#e0f7fa'; ctx.fillRect(0,0,W,H);
            ctx.strokeStyle = '#ff5252'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
            
            ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.r, 0, 7); ctx.fill();
            drawCircle(p1); drawCircle(p2);
        }

        function drawCircle(p) {
            ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 7); ctx.fill();
        }

        function resize() { W = window.innerWidth; H = window.innerHeight; canvas.width = W; canvas.height = H; draw(); }
        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
